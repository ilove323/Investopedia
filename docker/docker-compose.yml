services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: investopedia_app:latest
    container_name: investopedia_app
    ports:
      - "8501:8501"
    volumes:
      - ../:/app
    command: ["/usr/local/bin/streamlit", "run", "app.py", "--server.port=8501", "--server.address=0.0.0.0"]
    restart: unless-stopped
    networks:
      - ragflow

networks:
  ragflow:
    external: true
